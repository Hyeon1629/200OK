spring:
  application:
    name: checkdang

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

server:
  port: 8080

  security:
    oauth2:
      resourceserver:
        jwt:
          # Cognito User Pool의 issuer URI
          # 형식: https://cognito-idp.{region}.amazonaws.com/{userPoolId}
          issuer-uri: ${COGNITO_ISSUER_URI}

management:
  endpoints:
    web:
      exposure:
        include: health
